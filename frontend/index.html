<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TG Upload Manager</title>
  <link rel="stylesheet" href="/static/styles.css?v=__APP_ASSET_VERSION__">
</head>
<body>
  <div id="access-screen" class="access-screen hidden">
    <form id="access-login-form" class="access-card">
      <div class="brand-mark" aria-hidden="true">TG</div>
      <h2>输入访问密码</h2>
      <p class="muted">当前控制台已启用访问保护，请先输入密码后再进入。</p>
      <input id="access-login-password" type="password" placeholder="访问密码" autocomplete="current-password" required>
      <button type="submit">进入控制台</button>
      <p id="access-login-error" class="danger"></p>
    </form>
  </div>

  <div class="topbar">
    <div class="topbar-inner">
      <div class="topbar-brand">
        <div class="brand-mark" aria-hidden="true">TG</div>
        <div class="brand-copy">
          <span class="brand-version">v__APP_DISPLAY_VERSION__</span>
          <h1>控制台</h1>
        </div>
        <button id="refresh-all" class="ghost" type="button">刷新</button>
      </div>
      <div class="topbar-status">
        <div class="status-card login-card">
          <div class="status-card-head">
            <span class="label">登录状态</span>
            <span class="status-dot" aria-hidden="true"></span>
          </div>
          <strong id="login-stage">加载中</strong>
          <span class="status-hint">会话状态实时同步</span>
          <span id="login-error" class="muted"></span>
        </div>
        <div class="status-card status-wide">
          <div class="status-card-head">
            <span class="label">任务总览</span>
            <span id="global-status" class="muted" aria-live="polite"></span>
          </div>
          <div id="top-upload-stats" class="top-stats-grid"></div>
        </div>
      </div>
    </div>
  </div>

  <div class="shell">
    <section id="global-banner" class="global-banner hidden" aria-live="polite"></section>
    <div id="toast-stack" class="toast-stack" aria-live="polite" aria-atomic="true"></div>

    <main class="workspace">
      <aside class="tab-nav" aria-label="主导航">
        <div class="tab-nav-head">
          <span class="label">工作区</span>
          <strong>主导航</strong>
        </div>
        <button class="tab-link active" data-tab-trigger="settings" type="button">
          <span class="tab-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="12" cy="12" r="3.2"></circle>
              <path d="M19.4 15a1.6 1.6 0 0 0 .32 1.76l.05.05a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.05-.05a1.6 1.6 0 0 0-1.76-.32 1.6 1.6 0 0 0-.97 1.47V21a2 2 0 0 1-4 0v-.08a1.6 1.6 0 0 0-.97-1.47 1.6 1.6 0 0 0-1.76.32l-.05.05a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.05-.05A1.6 1.6 0 0 0 4.6 15a1.6 1.6 0 0 0-1.47-.97H3a2 2 0 0 1 0-4h.08A1.6 1.6 0 0 0 4.55 9.1a1.6 1.6 0 0 0-.32-1.76l-.05-.05a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.05.05A1.6 1.6 0 0 0 8.82 4.8h.08A1.6 1.6 0 0 0 10.37 3.3V3a2 2 0 0 1 4 0v.08a1.6 1.6 0 0 0 .97 1.47 1.6 1.6 0 0 0 1.76-.32l.05-.05a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.05.05A1.6 1.6 0 0 0 19.45 9c0 .64.38 1.22.97 1.47H21a2 2 0 0 1 0 4h-.08c-.64 0-1.22.38-1.52.97z"></path>
            </svg>
          </span>
          <span class="tab-copy">
            <strong>设置</strong>
            <small>登录、频道与目录配置</small>
          </span>
        </button>
        <button class="tab-link" data-tab-trigger="files" type="button">
          <span class="tab-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
              <path d="M3 7.5A2.5 2.5 0 0 1 5.5 5H10l2 2h6.5A2.5 2.5 0 0 1 21 9.5v8A2.5 2.5 0 0 1 18.5 20h-13A2.5 2.5 0 0 1 3 17.5z"></path>
              <path d="M3 10h18"></path>
            </svg>
          </span>
          <span class="tab-copy">
            <strong>目录查看</strong>
            <small>筛选文件、预览与手动上传</small>
          </span>
        </button>
        <button class="tab-link" data-tab-trigger="uploads" type="button">
          <span class="tab-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
              <path d="M12 16V4"></path>
              <path d="m7 9 5-5 5 5"></path>
              <rect x="4" y="16" width="16" height="4" rx="2"></rect>
            </svg>
          </span>
          <span class="tab-copy">
            <strong>上传任务</strong>
            <small>查看进度、重试与清理任务</small>
          </span>
        </button>
        <div class="tab-nav-foot">
          <span>已聚合登录、文件浏览与任务处理流程</span>
        </div>
      </aside>

      <div class="tab-stage">
        <section class="tab-panel active" data-tab-panel="settings">
          <div class="subtab-nav" aria-label="设置页导航">
            <button class="subtab-link active" data-settings-tab-trigger="access" type="button">访问密码</button>
            <button class="subtab-link" data-settings-tab-trigger="auth" type="button">登录配置</button>
            <button class="subtab-link" data-settings-tab-trigger="channel" type="button">频道配置</button>
            <button class="subtab-link" data-settings-tab-trigger="folder" type="button">目录配置</button>
          </div>

          <div class="settings-grid">
            <section class="card settings-panel active" data-settings-tab-panel="access">
              <div class="section-head">
                <h2>访问密码</h2>
                <span id="access-password-status" class="section-note"></span>
              </div>
              <form id="access-password-form" class="stack">
                <label>
                  <span>访问密码</span>
                  <input id="access-password-input" type="password" placeholder="设置后进入页面需要先输入此密码">
                </label>
                <div class="actions">
                  <button type="submit">保存密码</button>
                  <button id="access-password-clear" class="ghost" type="button">清除密码</button>
                </div>
              </form>
              <p class="muted">未设置时可直接进入页面；设置后需要先通过访问密码验证，才会显示控制台内容。</p>
            </section>

            <section class="card settings-panel" data-settings-tab-panel="auth">
              <div class="section-head">
                <h2>Telegram 登录</h2>
                <span class="section-note">登录态与会话自动持久化</span>
              </div>
              <form id="api-form" class="stack">
                <p class="form-hint">已保存参数会以脱敏形式展示；留空提交表示沿用当前已保存配置，重新填写才会覆盖。</p>
                <label>
                  <span>API ID</span>
                  <input id="api-id" name="api_id" type="number" inputmode="numeric">
                </label>
                <label>
                  <span>API Hash</span>
                  <input id="api-hash" name="api_hash">
                </label>
                <label>
                  <span>手机号</span>
                  <input id="phone-number" name="phone_number">
                </label>
                <div class="actions">
                  <button type="submit">开始登录</button>
                </div>
              </form>
              <form id="code-form" class="inline-form">
                <input id="code-input" placeholder="验证码">
                <button type="submit">提交验证码</button>
              </form>
              <form id="password-form" class="inline-form">
                <input id="password-input" type="password" placeholder="二次验证密码">
                <button type="submit">提交密码</button>
              </form>
            </section>

            <section class="card settings-panel" data-settings-tab-panel="channel">
              <div class="section-head">
                <h2>频道配置</h2>
              </div>
              <form id="channel-form" class="stack">
                <input id="channel-id" type="hidden">
                <label>
                  <span>频道名称</span>
                  <input id="channel-name" required>
                </label>
                <label>
                  <span>频道标识</span>
                  <input id="channel-target" placeholder="@channel_name 或 -100..." required>
                </label>
                <label class="toggle switch-row">
                  <input id="channel-enabled" type="checkbox" checked>
                  <span class="switch-copy">
                    <strong>启用频道</strong>
                    <small>关闭后该频道不会参与上传</small>
                  </span>
                </label>
                <div class="actions">
                  <button type="submit">保存频道</button>
                  <button type="button" id="channel-reset" class="ghost">清空</button>
                </div>
              </form>
              <div id="channel-list" class="list"></div>
            </section>

            <section class="card wide settings-panel" data-settings-tab-panel="folder">
              <div class="section-head">
                <h2>监控目录配置</h2>
              </div>
              <form id="folder-form" class="folder-form">
                <input id="folder-id" type="hidden">
                <label>
                  <span>名称</span>
                  <input id="folder-name" required>
                </label>
                <label>
                  <span>路径</span>
                  <input id="folder-path" placeholder="F:\media\movies 或 /media/movies" required>
                </label>
                <label>
                  <span>目标频道</span>
                  <select id="folder-channel" required></select>
                </label>
                <label>
                  <span>扫描频率(秒)</span>
                  <input id="folder-interval" type="number" min="5" max="3600" value="30" required>
                </label>
                <label>
                  <span>上传后处理</span>
                  <select id="folder-action">
                    <option value="keep">保留原文件</option>
                    <option value="delete">删除原文件</option>
                    <option value="move">移动到目标目录</option>
                  </select>
                </label>
                <label>
                  <span>移动目标路径</span>
                  <input id="folder-move-target" placeholder="仅当处理策略为 move 时需要">
                </label>
                <label class="toggle switch-row">
                  <input id="folder-auto" type="checkbox" checked>
                  <span class="switch-copy">
                    <strong>自动上传</strong>
                    <small>扫描到新文件后自动创建上传任务</small>
                  </span>
                </label>
                <label class="toggle switch-row">
                  <input id="folder-media-group" type="checkbox">
                  <span class="switch-copy">
                    <strong>媒体组上传</strong>
                    <small>启用后，多张图片或多个视频会按 Telegram 相册样式合并上传</small>
                  </span>
                </label>
                <label class="toggle switch-row">
                  <input id="folder-enabled" type="checkbox" checked>
                  <span class="switch-copy">
                    <strong>启用目录</strong>
                    <small>关闭后该目录不会被扫描或处理</small>
                  </span>
                </label>
                <div class="actions">
                  <button type="submit">保存目录</button>
                  <button type="button" id="folder-reset" class="ghost">清空</button>
                </div>
              </form>
              <div id="folder-list" class="list"></div>
            </section>
          </div>
        </section>

        <section class="tab-panel" data-tab-panel="files">
          <section class="card wide file-browser-card">
            <div class="section-head section-head-compact file-browser-head">
              <h2>目录浏览与手动上传</h2>
            </div>
            <div class="toolbar dense toolbar-compact file-toolbar">
              <select id="file-columns">
                <option value="3">每行 3 个</option>
                <option value="4" selected>每行 4 个</option>
                <option value="5">每行 5 个</option>
                <option value="6">每行 6 个</option>
              </select>
              <select id="browser-folder"></select>
              <select id="file-type-filter">
                <option value="all">全部类型</option>
                <option value="video">视频</option>
                <option value="image">图片</option>
                <option value="music">音乐</option>
                <option value="document">文档</option>
                <option value="other">其他</option>
              </select>
              <select id="file-status-filter">
                <option value="all">全部状态</option>
                <option value="pending">未上传</option>
                <option value="uploaded">已上传</option>
                <option value="locked">占用中</option>
              </select>
              <select id="file-scope-filter">
                <option value="direct">仅当前目录</option>
                <option value="recursive">包含子目录</option>
              </select>
              <input id="file-search" placeholder="搜索文件名或路径">
              <select id="file-page-size">
                <option value="10" selected>每页 10 个</option>
                <option value="20">每页 20 个</option>
                <option value="50">每页 50 个</option>
                <option value="100">每页 100 个</option>
              </select>
              <button id="browser-refresh" class="ghost" type="button">刷新列表</button>
              <button id="select-visible-files" class="ghost" type="button">全选当前结果</button>
              <button id="clear-file-selection" class="ghost" type="button">清空选择</button>
              <button id="browser-scan" class="ghost" type="button">立即扫描</button>
              <button id="browser-upload" type="button">上传选中</button>
            </div>
            <div id="file-stats" class="stats-grid"></div>
            <div id="file-summary" class="muted">请选择监控目录</div>
            <div class="browser-layout">
              <aside class="browser-sidebar">
                <div class="section-head compact browser-sidebar-head">
                  <h3>目录树</h3>
                  <button id="reset-subdir" class="ghost" type="button">回到根目录</button>
                </div>
                <button id="toggle-browser-sidebar" class="ghost browser-sidebar-toggle" type="button" aria-expanded="true">收起目录</button>
                <div id="file-tree" class="tree-list"></div>
              </aside>
              <div class="browser-main">
                <div id="file-current-path" class="muted"></div>
                <div id="file-feedback" class="panel-feedback hidden"></div>
                <div id="file-list" class="file-grid"></div>
                <div id="file-pagination" class="pagination-bar hidden"></div>
              </div>
            </div>
          </section>
        </section>

        <section class="tab-panel" data-tab-panel="uploads">
          <section class="card wide upload-task-card">
            <div class="section-head section-head-compact upload-task-head">
              <h2>上传任务</h2>
            </div>
            <div class="toolbar dense toolbar-compact upload-toolbar">
              <div class="upload-toolbar-row upload-toolbar-row-filters">
                <select id="task-columns">
                  <option value="3" selected>每行 3 个</option>
                  <option value="4">每行 4 个</option>
                  <option value="5">每行 5 个</option>
                  <option value="6">每行 6 个</option>
                </select>
                <select id="task-folder-filter">
                  <option value="all">全部目录</option>
                </select>
                <select id="task-status-filter">
                  <option value="all">全部状态</option>
                  <option value="pending">未上传</option>
                  <option value="uploading">上传中</option>
                  <option value="uploaded">已上传</option>
                  <option value="failed">失败</option>
                  <option value="locked">占用中</option>
                </select>
                <select id="task-sort">
                  <option value="updated_desc">最近更新</option>
                  <option value="created_desc">最近创建</option>
                  <option value="progress_desc">进度最高</option>
                  <option value="name_asc">文件名 A-Z</option>
                </select>
                <input id="task-search" placeholder="搜索任务或错误信息">
                <select id="upload-page-size">
                  <option value="10" selected>每页 10 个</option>
                  <option value="20">每页 20 个</option>
                  <option value="50">每页 50 个</option>
                  <option value="100">每页 100 个</option>
                </select>
              </div>
              <div class="upload-toolbar-row upload-toolbar-row-actions">
                <button id="upload-refresh" class="ghost" type="button">刷新任务</button>
                <button id="select-visible-tasks" class="ghost" type="button">全选当前结果</button>
                <button id="clear-task-selection" class="ghost" type="button">清空选择</button>
                <button id="retry-selected" class="ghost" type="button">重试选中</button>
                <button id="delete-selected" class="ghost" type="button">清理选中</button>
                <button id="clear-finished" class="ghost caution" type="button">清理已完成</button>
                <button id="clear-failed" class="ghost caution" type="button">清理失败/占用</button>
                <button id="clear-all" class="ghost danger-action" type="button">清理全部</button>
              </div>
            </div>
            <div id="upload-feedback" class="panel-feedback hidden"></div>
            <div id="upload-summary" class="muted upload-summary"></div>
            <div id="upload-list" class="upload-list"></div>
            <div id="upload-pagination" class="pagination-bar hidden"></div>
          </section>
        </section>
      </div>
    </main>
  </div>

  <dialog id="preview-dialog">
    <div class="dialog-toolbar">
      <div class="preview-size-group" role="group" aria-label="预览尺寸">
        <button id="preview-size-small" class="ghost" type="button" data-preview-size="small">小</button>
        <button id="preview-size-medium" class="ghost" type="button" data-preview-size="medium">中</button>
        <button id="preview-size-large" class="ghost" type="button" data-preview-size="large">大</button>
      </div>
      <button id="preview-prev" class="ghost" type="button">上一项</button>
      <button id="preview-next" class="ghost" type="button">下一项</button>
      <button id="preview-close" class="preview-close" type="button">关闭</button>
    </div>
    <div id="preview-body"></div>
  </dialog>

  <dialog id="task-detail-dialog">
    <div class="task-detail-toolbar">
      <div class="dialog-toolbar">
        <button id="copy-task-id" class="ghost" type="button">复制任务 ID</button>
        <button id="copy-task-path" class="ghost" type="button">复制文件路径</button>
        <button id="task-detail-close" class="preview-close" type="button">关闭</button>
      </div>
    </div>
    <div id="task-detail-body"></div>
  </dialog>

  <script type="module" src="/static/app.js?v=__APP_ASSET_VERSION__"></script>
</body>
</html>
